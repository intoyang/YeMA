<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Prevent FOUC: apply dark class before CSS loads -->
  <script th:inline="javascript">
    (function () {
      var DEFAULT = /*[[${theme.config?.advanced?.default_color_scheme} ?: 'auto']]*/ 'auto';
      var saved = localStorage.getItem('yema-theme');
      var scheme = saved || DEFAULT;
      var shouldDark = scheme === 'dark' ||
        (scheme === 'auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (shouldDark) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=LXGW+WenKai:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />


  
    <title th:text="|${post.spec.title} - ${site.title}|">Post</title>
    <meta th:if="${not #strings.isEmpty(post.status.excerpt)}" name="description" th:content="${post.status.excerpt}" />
  
  <script type="module" crossorigin src="/themes/yema/assets/main-CXfjIY5o.js"></script>
  <link rel="stylesheet" crossorigin href="/themes/yema/assets/main-qfmRNlaZ.css">
</head>

<body class="min-h-screen flex flex-col">

  <header
  class="sticky top-0 z-50 bg-bg/90 backdrop-blur border-b border-border"
  th:with="menu = ${menuFinder.getPrimary()}"
>
  <div class="max-w-layout mx-auto px-6 py-4 flex items-center justify-between gap-6">

    <!-- Brand -->
    <a href="/" class="flex items-center gap-2 flex-shrink-0">
      <th:block th:if="${not #strings.isEmpty(theme.config?.home?.site_title_image)}">
        <img
          th:src="${theme.config.home.site_title_image}"
          th:alt="${site.title}"
          class="h-10 w-auto"
        />
      </th:block>
      <span
        th:unless="${not #strings.isEmpty(theme.config?.home?.site_title_image)}"
        class="font-serif italic text-2xl text-text tracking-tight"
        th:text="${#strings.isEmpty(theme.config?.home?.site_title_text) ? site.title : theme.config.home.site_title_text}"
      ></span>
    </a>

    <!-- Desktop menu -->
    <nav
      th:if="${menu != null}"
      class="hidden md:flex items-center gap-1 font-serif text-text"
    >
      <a
        th:each="item : ${menu.menuItems}"
        th:href="@{${item.status.href}}"
        th:text="${item.status.displayName}"
        class="text-text-muted hover:text-text hover:bg-surface transition-all duration-200 px-3 py-2 rounded"
      ></a>
    </nav>

    <!-- Right actions -->
    <div class="flex items-center gap-2">
      <!-- Theme toggle -->
      <button
        th:if="${theme.config?.advanced?.enable_color_switch != false}"
        id="theme-toggle"
        type="button"
        aria-label="切换配色"
        class="w-10 h-10 flex items-center justify-center rounded-full text-text-muted hover:text-text hover:bg-surface transition-colors"
      >
        <span class="material-symbols-outlined theme-icon-light text-[20px]">light_mode</span>
        <span class="material-symbols-outlined theme-icon-dark hidden text-[20px]">dark_mode</span>
      </button>

      <!-- Mobile menu button -->
      <button
        id="mobile-menu-btn"
        type="button"
        aria-label="菜单"
        class="md:hidden w-10 h-10 flex items-center justify-center rounded-full text-text-muted hover:text-text hover:bg-surface transition-colors"
      >
        <span class="material-symbols-outlined text-[22px]">menu</span>
      </button>
    </div>
  </div>

  <!-- Mobile drawer -->
  <nav
    id="mobile-menu"
    th:if="${menu != null}"
    class="md:hidden hidden border-t border-border bg-bg"
  >
    <div class="max-w-layout mx-auto px-6 py-3 flex flex-col gap-1 font-serif">
      <a
        th:each="item : ${menu.menuItems}"
        th:href="@{${item.status.href}}"
        th:text="${item.status.displayName}"
        class="text-text-muted hover:text-text hover:bg-surface transition-all px-3 py-2 rounded"
      ></a>
    </div>
  </nav>
</header>


  <main class="flex-grow">
    
  

  <article class="w-full">
    <!-- Immersive header with cover -->
    <header
      th:if="${theme.config?.post?.show_cover != false and not #strings.isEmpty(post.spec.cover)}"
      class="w-full relative overflow-hidden flex items-end justify-center"
      style="min-height: 60vh; max-height: 80vh;"
    >
      <img
        th:src="${post.spec.cover}"
        th:alt="${post.spec.title}"
        class="absolute inset-0 w-full h-full object-cover"
      />
      <!-- Gradient overlay blending into surface -->
      <div
        class="absolute inset-0"
        style="background: linear-gradient(to bottom, transparent 0%, transparent 40%, var(--bg) 100%);"
      ></div>
      <div class="relative z-10 max-w-4xl mx-auto px-6 pb-16 text-center">
        <span
          th:if="${not #lists.isEmpty(post.categories)}"
          class="text-overline tracking-widest uppercase text-primary block mb-4"
          th:text="${post.categories[0].spec.displayName}"
        ></span>
        <h1
          class="text-display font-serif text-text mb-6 leading-tight"
          th:text="${post.spec.title}"
        ></h1>
        <p class="text-body-e font-serif italic text-text-muted">
          <th:block th:if="${post.contributors != null and not #lists.isEmpty(post.contributors)}">
            <span>By </span><span th:text="${post.contributors[0].displayName}"></span>
          </th:block>
          <th:block th:if="${theme.config?.post?.show_reading_time != false and post.stats != null}">
            <span th:if="${post.contributors != null and not #lists.isEmpty(post.contributors)}"> — </span>
            <span>Reading time: </span><span th:text="${(post.stats.visit ?: 0)}"></span>
            <span th:text="|· ${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}|"></span>
          </th:block>
          <th:block th:unless="${post.stats != null}">
            <span th:if="${post.contributors != null and not #lists.isEmpty(post.contributors)}"> — </span>
            <span th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}"></span>
          </th:block>
        </p>
      </div>
    </header>

    <!-- Simple header without cover -->
    <header
      th:unless="${theme.config?.post?.show_cover != false and not #strings.isEmpty(post.spec.cover)}"
      class="max-w-reading mx-auto px-6 pt-section-v pb-12 text-center"
    >
      <span
        th:if="${not #lists.isEmpty(post.categories)}"
        class="text-overline tracking-widest uppercase text-primary block mb-4"
        th:text="${post.categories[0].spec.displayName}"
      ></span>
      <h1
        class="text-h-lg md:text-display font-serif text-text mb-6 leading-tight"
        th:text="${post.spec.title}"
      ></h1>
      <p
        class="text-body-e font-serif italic text-text-muted"
        th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}"
      ></p>
    </header>

    <!-- Body -->
    <div class="w-full bg-bg">
      <div class="max-w-reading mx-auto px-6 py-16">
        <div
          class="post-content space-y-6"
          th:classappend="${theme.config?.post?.drop_cap_enabled != false ? 'has-dropcap' : ''}"
          th:utext="${post.content.content}"
        ></div>

        <!-- Tags -->
        <div
          th:if="${not #lists.isEmpty(post.tags)}"
          class="mt-16 pt-8 border-t border-border flex flex-wrap gap-2"
        >
          <a
            th:each="tag : ${post.tags}"
            th:href="@{${tag.status.permalink}}"
            th:text="|#${tag.spec.displayName}|"
            class="px-3 py-1 text-label text-text-muted border border-border rounded-full hover:border-primary hover:text-primary transition-colors"
          ></a>
        </div>
      </div>
    </div>
  </article>

  <!-- Prev/Next navigation -->
  <th:block th:if="${theme.config?.post?.show_prev_next != false}">
    <!--
  Prev/Next navigation (uses postFinder.cursor for adjacent posts).
  Accepts: ${post.metadata.name}
-->
<section
  th:with="cursor = ${postFinder.cursor(post.metadata.name)}"
  th:if="${cursor != null and (cursor.previous != null or cursor.next != null)}"
  class="border-t border-border py-section-v"
>
  <div class="max-w-4xl mx-auto px-6">
    <h2 class="text-h-lg font-serif text-text text-center mb-12">Continue the Journey</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

      <!-- Previous -->
      <a
        th:if="${cursor.previous != null}"
        th:href="@{${cursor.previous.status.permalink}}"
        class="group block bg-surface border border-border rounded-xl p-card-p ring-1 ring-border transition-all duration-300 hover:shadow-ring relative overflow-hidden"
      >
        <div class="absolute top-0 left-0 w-1 h-full bg-border group-hover:bg-primary transition-colors"></div>
        <span class="text-overline tracking-widest uppercase text-text-muted mb-2 flex items-center gap-2">
          <span class="material-symbols-outlined text-[14px]">arrow_left_alt</span>
          Previous Story
        </span>
        <h3
          class="text-2xl font-serif text-text mb-3 group-hover:text-primary transition-colors line-clamp-2"
          th:text="${cursor.previous.spec.title}"
        ></h3>
        <p
          th:if="${not #strings.isEmpty(cursor.previous.status.excerpt)}"
          class="text-body text-text-muted line-clamp-2 opacity-80"
          th:text="${cursor.previous.status.excerpt}"
        ></p>
      </a>
      <div th:unless="${cursor.previous != null}" class="hidden md:block"></div>

      <!-- Next -->
      <a
        th:if="${cursor.next != null}"
        th:href="@{${cursor.next.status.permalink}}"
        class="group block bg-surface border border-border rounded-xl p-card-p ring-1 ring-border transition-all duration-300 hover:shadow-ring relative overflow-hidden text-right"
      >
        <div class="absolute top-0 right-0 w-1 h-full bg-border group-hover:bg-tertiary transition-colors"></div>
        <span class="text-overline tracking-widest uppercase text-text-muted mb-2 flex items-center justify-end gap-2">
          Next Story
          <span class="material-symbols-outlined text-[14px]">arrow_right_alt</span>
        </span>
        <h3
          class="text-2xl font-serif text-text mb-3 group-hover:text-tertiary transition-colors line-clamp-2"
          th:text="${cursor.next.spec.title}"
        ></h3>
        <p
          th:if="${not #strings.isEmpty(cursor.next.status.excerpt)}"
          class="text-body text-text-muted line-clamp-2 opacity-80"
          th:text="${cursor.next.status.excerpt}"
        ></p>
      </a>
    </div>
  </div>
</section>

  </th:block>

  <!-- Comments -->
  <th:block th:if="${haloCommentEnabled}">
    <section class="border-t border-border py-16">
      <div class="max-w-reading mx-auto px-6 comment-wrapper">
        <h2 class="text-h-md font-serif text-text mb-8">评论</h2>
        <halo:comment
          group="content.halo.run"
          kind="Post"
          th:attr="name=${post.metadata.name}"
        />
      </div>
    </section>
  </th:block>

  </main>

  <footer class="w-full" style="background: var(--footer-bg); color: var(--footer-text);">
  <div class="max-w-layout mx-auto px-6 py-16 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">

    <!-- LEFT: Brand + copyright + beian + social -->
    <div class="flex flex-col gap-6">

      <!-- Brand: image preferred, else text -->
      <div class="flex flex-col gap-3">
        <th:block th:if="${not #strings.isEmpty(theme.config?.footer?.brand_image)}">
          <img
            th:src="${theme.config.footer.brand_image}"
            th:alt="${site.title}"
            th:style="|width: ${theme.config.footer.brand_scale ?: 100}%|"
            class="max-w-[180px]"
          />
        </th:block>
        <span
          th:unless="${not #strings.isEmpty(theme.config?.footer?.brand_image)}"
          class="font-serif italic text-2xl"
          th:text="${#strings.isEmpty(theme.config?.footer?.brand_text) ? site.title : theme.config.footer.brand_text}"
        ></span>
        <p
          th:if="${not #strings.isEmpty(theme.config?.footer?.slogan)}"
          th:text="${theme.config.footer.slogan}"
          class="text-sm opacity-70 font-serif"
        ></p>
      </div>

      <!-- Copyright + Beian -->
      <div class="text-xs space-y-1" style="color: var(--footer-text-muted);">
        <div
          th:if="${not #strings.isEmpty(theme.config?.footer?.copyright)}"
          th:utext="${theme.config.footer.copyright}"
        ></div>

        <div
          th:if="${theme.config?.footer?.beian?.show_icp or theme.config?.footer?.beian?.show_gongan}"
          class="flex flex-wrap items-center gap-x-3 gap-y-1 pt-1"
        >
          <a
            th:if="${theme.config?.footer?.beian?.show_icp and not #strings.isEmpty(theme.config.footer.beian.icp)}"
            th:href="${theme.config.footer.beian.icp_link ?: '#'}"
            th:text="${theme.config.footer.beian.icp}"
            target="_blank"
            rel="noopener"
            class="hover:underline"
          ></a>
          <a
            th:if="${theme.config?.footer?.beian?.show_gongan and not #strings.isEmpty(theme.config.footer.beian.gongan)}"
            th:href="${theme.config.footer.beian.gongan_link ?: '#'}"
            th:text="${theme.config.footer.beian.gongan}"
            target="_blank"
            rel="noopener"
            class="hover:underline"
          ></a>
        </div>
      </div>

      <!-- Social media -->
      <ul
        th:if="${not #lists.isEmpty(theme.config?.footer?.social_media)}"
        class="flex flex-wrap gap-2"
      >
        <li th:each="item : ${theme.config.footer.social_media}">
          <a
            th:href="${item.url_type == 'image'} ? |javascript:openSocialImage('${item.url}');| : ${item.url}"
            th:target="${item.url_type == 'image' ? '_self' : '_blank'}"
            rel="noreferrer"
            class="inline-flex items-center justify-center w-9 h-9 rounded-full hover:bg-white/10 transition [&>svg]:size-4"
            style="color: var(--footer-text-muted);"
          >
            <span class="sr-only" th:text="${item.name}"></span>
            <th:block
              th:if="${item.iconify != null}"
              th:utext="${item.iconify.value}"
            ></th:block>
          </a>
        </li>
      </ul>
    </div>

    <!-- RIGHT: Menu groups -->
    <div
      th:if="${not #lists.isEmpty(theme.config?.footer?.menu_names)}"
      class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6"
    >
      <th:block th:each="name : ${theme.config.footer.menu_names}">
        <div th:with="menu = ${menuFinder.getByName(name)}" th:if="${menu != null}">
          <p class="font-serif text-base mb-4" th:text="${menu.spec.displayName}"></p>
          <ul class="space-y-2 text-sm" style="color: var(--footer-text-muted);">
            <li th:each="item : ${menu.menuItems}">
              <a
                th:href="@{${item.status.href}}"
                th:text="${item.status.displayName}"
                class="hover:underline transition-opacity"
              ></a>
            </li>
          </ul>
        </div>
      </th:block>
    </div>
  </div>
</footer>

<script>
  function openSocialImage(url) {
    var modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out';
    var img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:90%;max-height:90%;border-radius:12px';
    modal.appendChild(img);
    modal.onclick = function () { document.body.removeChild(modal); };
    document.body.appendChild(modal);
  }
</script>


  <halo:footer />
</body>
</html>
